set default=0
set timeout=3

serial --unit=0 --speed=115200 --word=8 --parity=no --stop=1
terminal_input console serial
terminal_output console serial

menuentry "UP7000 Linux" {
    linux   /bzImage console=ttyS0,115200n8 console=tty1 root=PARTUUID=UUID_TMP rw rootwait net.ifnames=0 biosdevname=0
}
