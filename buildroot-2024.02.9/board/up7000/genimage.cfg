image efi.vfat {
	vfat {
		file EFI {
			image = "efi-part/EFI"
		}
		file bzImage {
			image = "bzImage"
		}
	}
	size = 64M
}

image up7000.img {
	hdimage {
		gpt = "true"
	}

	partition efi {
		partition-type-uuid = U
		bootable = true
		image = "efi.vfat"
		size = 64M
	}

	partition rootfs {
		partition-type-uuid = L
		partition-uuid = UUID_TMP
		image = "rootfs.ext4"
		size = 2048M
	}
}
